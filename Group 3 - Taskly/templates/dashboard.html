<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Taskly | Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
<header class="header">
    <div class="logo"><i class="fa-solid fa-list-check"></i><span>Taskly</span></div>
    <nav class="navbar">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('tasks') }}">Tasks</a>
        <a href="{{ url_for('add_task') }}">Add Task</a>
        <a href="{{ url_for('profile') }}">Profile</a>
    </nav>
</header>
<div class="page-container">
    <h1>Welcome to Taskly 💜</h1>
    <div class="cards">
        <div class="card"><i class="fa-solid fa-list"></i><h3>Total Tasks</h3><p>12</p></div>
        <div class="card"><i class="fa-solid fa-check"></i><h3>Completed</h3><p>5</p></div>
        
    </div>
    <a href="{{ url_for('tasks') }}" class="btn-link">View Tasks</a>
</div>
<footer class="footer">© 2026 Taskly | Manage your tasks easily 💜</footer>
</body>
</html>
