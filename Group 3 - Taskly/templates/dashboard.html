{% extends "layout.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="dashboard-pro">

    <div class="dashboard-header">
        <div class="dashboard-icon">
            <i class="fa-solid fa-chart-line"></i>
        </div>

        <h1>Welcome to Taskly 💜</h1>
        <p>Hello, {{ session.get("username") }}! Track your progress today.</p>
    </div>

    <div class="dashboard-stats">

        <div class="stat-box">
            <i class="fa-solid fa-list-check"></i>
            <span>Total Tasks</span>
            <strong>{{ total_tasks }}</strong>
        </div>

        <div class="stat-box">
            <i class="fa-solid fa-circle-check"></i>
            <span>Completed</span>
            <strong>{{ completed_tasks }}</strong>
        </div>

    </div>

    <div class="dashboard-actions">
        <a href="{{ url_for('tasks') }}">View Tasks</a>
        <a href="{{ url_for('add_task') }}">Add Task</a>
    </div>

</div>

{% endblock %}
