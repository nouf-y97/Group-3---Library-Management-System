{% extends "layout.html" %}

{% block title %}Edit Task{% endblock %}

{% block content %}

<div class="edit-task-card">

    <div class="edit-task-header">
        <div class="edit-task-icon">
            <i class="fa-solid fa-pen"></i>
        </div>
        <h1>Edit Task</h1>
        <p>Update your task information</p>
    </div>

    <form method="POST" class="task-form">

        <label>Task Title</label>
        <input type="text" name="title" value="{{ task['title'] }}" required>

        <label>Description</label>
        <textarea name="description">{{ task['description'] }}</textarea>

        <label>Priority</label>
        <select name="priority">
            <option value="Low" {% if task['priority'] == 'Low' %}selected{% endif %}>🟢 Low Priority</option>
            <option value="Medium" {% if task['priority'] == 'Medium' %}selected{% endif %}>🟡 Medium Priority</option>
            <option value="High" {% if task['priority'] == 'High' %}selected{% endif %}>🔴 High Priority</option>
        </select>

        <label>Due Date</label>
        <input type="date" name="due_date" value="{{ task['due_date'] }}" required>

        <div class="form-actions">
            <button type="submit" class="save-btn">
                <i class="fa-solid fa-check"></i>
                Update Task
            </button>

            <button type="button" class="back-btn" onclick="history.back()">
                <i class="fa-solid fa-arrow-left"></i>
                Back
            </button>
        </div>

    </form>

</div>

{% endblock %}
