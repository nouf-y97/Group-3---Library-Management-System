{% extends "layout.html" %}

{% block title %}Edit Task{% endblock %}

{% block content %}

<div class="form-box">
    <h1><i class="fa-solid fa-pen"></i> Edit Task</h1>

    <form method="POST">
        <div class="input-box">
            <input type="text" name="title" value="Study Flask" required>
        </div>

        <textarea name="description">Complete Flask pages and routes</textarea>

        <select name="priority">
            <option value="Low">🟢 Low Priority</option>
            <option value="Medium" selected>🟡 Medium Priority</option>
            <option value="High">🔴 High Priority</option>
        </select>

        <input type="date" name="due_date" class="date-input" value="2026-06-20">

        <button type="submit" class="btn">Update Task</button>
    </form>
</div>

{% endblock %}
