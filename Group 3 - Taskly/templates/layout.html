<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        Taskly
        {% endblock %}
    </title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<header class="header">
    <div class="logo">
        <i class="fa-solid fa-list-check"></i>
        <span>Taskly</span>
    </div>

  <nav class="navbar">

    {% if session.get('user_id') %}

   <a href="{{ url_for('dashboard') }}"
       class="{% if request.endpoint == 'dashboard' %}active{% endif %}">
       Dashboard
    </a>

    <a href="{{ url_for('tasks') }}"
       class="{% if request.endpoint == 'tasks' %}active{% endif %}">
       Tasks
    </a>

    <a href="{{ url_for('add_task') }}"
       class="{% if request.endpoint == 'add_task' %}active{% endif %}">
       Add Task
    </a>

    <a href="{{ url_for('profile') }}"
       class="{% if request.endpoint == 'profile' %}active{% endif %}">
       Profile
    </a>

   <a href="{{ url_for('logout') }}" class="logout-btn">
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout
    </a>

    {% else %}

    <a href="{{ url_for('login') }}">Login</a>
    <a href="{{ url_for('register') }}">Register</a>

    {% endif %}

</nav>
</header>

{% block content %}
{% endblock %}

<footer class="footer">
    © 2026 Taskly | Manage your tasks easily 💜
</footer>

</body>
</html>
