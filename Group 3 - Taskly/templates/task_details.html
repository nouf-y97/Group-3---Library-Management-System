{% extends "layout.html" %}

{% block title %}Task Details{% endblock %}

{% block content %}

<div class="details-box">
    <h1>Task Details</h1>

    <p><strong>Title:</strong> {{ task.title }}</p>
    <p><strong>Description:</strong> {{ task.description }}</p>
    <p><strong>Priority:</strong> {{ task.priority }}</p>
    <p><strong>Status:</strong> {{ task.status }}</p>
    <p><strong>Due Date:</strong> {{ task.due_date }}</p>

    <div class="actions">
        <a href="{{ url_for('edit_task', task_id=task['id']) }}" class="btn-link">Edit</a>
        <a href="{{ url_for('delete_task', task_id=task['id']) }}" class="btn-link">Delete</a>
        <a href="{{ url_for('tasks') }}" class="btn-link">Back</a>
    </div>
</div>

{% endblock %}
