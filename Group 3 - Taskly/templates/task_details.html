<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Taskly | Task Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
<header class="header">
    <div class="logo"><i class="fa-solid fa-list-check"></i><span>Taskly</span></div>

        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('tasks') }}">Tasks</a>

<div class="details-box">

    <div class="actions">
        <a href="{{ url_for('edit_task', task_id=1) }}" class="btn-link">Edit</a>
        <a href="{{ url_for('tasks') }}" class="btn-link">Back</a>
    </div>
</div>
<footer class="footer">© 2026 Taskly | Manage your tasks easily 💜</footer>

</html>
